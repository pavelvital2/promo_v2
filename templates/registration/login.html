{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
  <h1>Вход</h1>
  {% if form.errors %}
    <p class="error">Неверный логин или пароль.</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <p>
      <label for="{{ form.username.id_for_label }}">Логин</label><br>
      {{ form.username }}
    </p>
    <p>
      <label for="{{ form.password.id_for_label }}">Пароль</label><br>
      {{ form.password }}
    </p>
    <button type="submit">Войти</button>
  </form>
{% endblock %}
